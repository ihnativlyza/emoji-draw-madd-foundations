<body></body>
<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
<script>
/* global nn */

function draw ()   {
  if (nn.mouseDown) return 
  // let x = nn.random(nn.width)
  // let y = nn.random(nn.height)
    let z = nn.random(300)
    // let a = nn.mouseA
    let x = nn.mouseX
    let y = nn.mouseY
    nn.create('a-box')
      .content('☺️')
      .position(x, y)
      .css('user-select', 'none')
      .scale(3)
      .hueRotate(z)
      .rotate(100)
      .addTo('body')
}

// nn.times(200, draw)
   
nn.on('mousemove', draw)
  
</script>
